<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Contact | John Doe Portfolio</title>

    <meta name="description" content="Contact John Doe for frontend development projects and collaborations." />
</head>

<body>

    <a href="#main-content">Skip to Main Content</a>

    <header role="banner">
        <h1>Contact Me</h1>

        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">

        <section aria-labelledby="contact-heading">
            <h2 id="contact-heading">Get In Touch</h2>

            <!-- Accessible Form -->
            <form action="#" method="post" aria-label="Contact Form">

                <!-- Name -->
                <div>
                    <label for="name">Full Name</label><br />
                    <input
                        type="text"
                        id="name"
                        name="name"
                        required
                        autocomplete="name"
                    />
                </div>

                <br />

                <!-- Email -->
                <div>
                    <label for="email">Email Address</label><br />
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        autocomplete="email"
                    />
                </div>

                <br />

                <!-- Message -->
                <div>
                    <label for="message">Message</label><br />
                    <textarea
                        id="message"
                        name="message"
                        rows="6"
                        required
                    ></textarea>
                </div>

                <br />

                <!-- Submit -->
                <button type="submit">
                    Send Message
                </button>

            </form>
        </section>

    </main>

    <footer role="contentinfo">
        <p>&copy; 2026 John Doe</p>
    </footer>

</body>
</html>
